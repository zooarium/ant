services:
  api:
    build:
      context: .
      args:
        GO_VERSION: ${GO_VERSION:-1.26.3}
    ports:
      - "8082:8082"
      - "8083:8083"   # order-intake secondary listener
    volumes:
      - ./data:/app/data
      - ./log:/app/log
    environment:
      - ANT_ENVIRONMENT=development
      - ANT_DATABASE_PATH=/app/data/ant.db
      - ANT_LOG_DIR=/app/log
      # Accept keeper-minted impersonation tokens (sysadmin "login as user").
      # Secret MUST match keeper's AUTH.IMPERSONATION_JWT_SECRET (both default to
      # the same placeholder below). Revocation check is off for local dev:
      # keeper runs in a separate compose network, so ant cannot reach it — the
      # short token expiry is the backstop. Set it true + a reachable
      # ANT_IMPERSONATION_KEEPER_BASE_URL once both share a network.
      - ANT_IMPERSONATION_ENABLED=true
      - ANT_IMPERSONATION_JWT_SECRET=a-separate-impersonation-token-secret-key
      - ANT_IMPERSONATION_REVOCATION_CHECK=false
    restart: always

  atlas:
    image: arigaio/atlas
    volumes:
      - .:/app
      - ./data:/data
    working_dir: /app

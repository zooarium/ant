ENVIRONMENT: production
SERVER:
  ADDR: ":8082"
  HOST: "localhost:8082"
  READ_TIMEOUT: 5s
  WRITE_TIMEOUT: 10s
  IDLE_TIMEOUT: 120s
DATABASE:
  PATH: "data/ant.db"
  DRIVER: "sqlite3"
  DSN: ""
LOG:
  DIR: "log"
  LEVEL: "info"
AUTH:
  JWT_SECRET: "a-very-secure-and-shared-secret-key"
  JWT_EXPIRY: 24h
CORS:
  ALLOWED_ORIGINS:
    - "*"
# Google reCAPTCHA v3 verification for public write routes (order/group create).
# ENABLED=false skips verification (dev). SECRET is a placeholder — inject via
# env in production. Requests scoring below MIN_SCORE are rejected (403).
CAPTCHA:
  ENABLED: false
  SECRET: ""
  MIN_SCORE: 0.5
  TIMEOUT: 3s
# Per-identity cap on public order creation: at most MAX_ORDERS per device id
# (or client IP when no device id is sent) within WINDOW. Enforced in-tx.
PUBLIC_ORDER:
  MAX_ORDERS: 5
  WINDOW: 24h
# In-memory cache TTLs for read-heavy, rarely-changing responses. Invalidated
# explicitly on writes; the public storefront read is the hot path.
CACHE:
  STOREFRONT_TTL: 60s
# Optional secondary listeners: extra ports in the same process, each
# exposing only its allow-listed routes. Identity always comes from JWT;
# JWT_SECRET (optional) makes the listener verify with a different signing
# key instead of AUTH.JWT_SECRET. Per-entry defaults: RATE_LIMIT 100 req /
# 1m, NAME secondary-<i>.
SECONDARY:
  # Public order intake. Clients exchange a publishable site key for a
  # short-lived guest JWT at keeper POST /guest-keys/auth, then call this
  # port with it. JWT_SECRET must match keeper AUTH.GUEST_JWT_SECRET —
  # guest tokens verify only here, never on the primary port.
  # Allow-list: only listed routes are served; every other request (except
  # /health and /metrics) returns 404. Order history for returning-customer
  # recognition only — order creation stays on the primary port for now.
  - NAME: "order-intake"
    ENABLED: true
    ADDR: ":8083"
    JWT_SECRET: "a-separate-guest-token-secret-key"
    RATE_LIMIT:
      REQUESTS: 60
      WINDOW: 1m
    ROUTES:
      - "POST /public/orders"
      - "POST /public/order-groups"
      - "GET /public/order-groups/{token}"
      - "GET /public/order-groups/history"
      - "GET /public/products"
      - "GET /public/products/{id}"
      - "GET /public/storefront"

basePath: /
definitions:
  ant_ent_schema.Review:
    properties:
      author:
        type: string
      text:
        type: string
    type: object
  ant_internal_platform_render.Response:
    properties:
      data: {}
      error:
        type: string
      status:
        type: integer
    type: object
  ant_internal_product.AssignedAttribute:
    properties:
      attribute_id:
        type: integer
      is_mandatory:
        type: boolean
      name:
        type: string
      options:
        items:
          $ref: '#/definitions/ant_internal_product.AttributeOption'
        type: array
    type: object
  ant_internal_product.AttributeOption:
    properties:
      id:
        type: integer
      price_delta:
        type: number
      value:
        type: string
    type: object
  ant_internal_product.CategoryRef:
    properties:
      display:
        type: string
      id:
        type: integer
      name:
        type: string
      ord:
        description: |-
          Ord is the category's tenant-defined display position, so public
          clients can order menu groups without a separate categories call.
        type: integer
    type: object
  ant_internal_product.Product:
    properties:
      app_id:
        type: integer
      attributes:
        items:
          $ref: '#/definitions/ant_internal_product.AssignedAttribute'
        type: array
      category:
        $ref: '#/definitions/ant_internal_product.CategoryRef'
      category_id:
        type: integer
      created_at:
        type: string
      division_id:
        type: integer
      featured:
        type: boolean
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      status:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_attribute.Attribute:
    properties:
      app_id:
        type: integer
      created_at:
        type: string
      division_id:
        type: integer
      id:
        type: integer
      name:
        type: string
      options:
        items:
          $ref: '#/definitions/internal_attribute.Option'
        type: array
      status:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_attribute.CreateAttributeRequest:
    properties:
      name:
        maxLength: 100
        type: string
      options:
        items:
          $ref: '#/definitions/internal_attribute.CreateOptionRequest'
        type: array
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    type: object
  internal_attribute.CreateOptionRequest:
    properties:
      value:
        maxLength: 100
        type: string
    required:
    - value
    type: object
  internal_attribute.Option:
    properties:
      id:
        type: integer
      value:
        type: string
    type: object
  internal_attribute.SyncOptionRequest:
    properties:
      id:
        minimum: 1
        type: integer
      value:
        maxLength: 100
        type: string
    required:
    - value
    type: object
  internal_attribute.UpdateAttributeRequest:
    properties:
      name:
        maxLength: 100
        type: string
      options:
        items:
          $ref: '#/definitions/internal_attribute.SyncOptionRequest'
        type: array
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    - status
    type: object
  internal_category.Category:
    properties:
      app_id:
        type: integer
      created_at:
        type: string
      depth:
        type: integer
      display:
        type: string
      division_id:
        type: integer
      id:
        type: integer
      name:
        type: string
      ord:
        type: integer
      parent_id:
        type: integer
      path:
        type: string
      status:
        type: integer
      updated_at:
        type: string
    type: object
  internal_category.CreateCategoryRequest:
    properties:
      name:
        maxLength: 100
        type: string
      parent_id:
        type: integer
    required:
    - name
    type: object
  internal_category.MoveCategoryRequest:
    properties:
      parent_id:
        type: integer
    type: object
  internal_category.ReorderItem:
    properties:
      id:
        type: integer
      ord:
        type: integer
    required:
    - id
    type: object
  internal_category.ReorderRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_category.ReorderItem'
        maxItems: 500
        minItems: 1
        type: array
    required:
    - items
    type: object
  internal_category.UpdateCategoryRequest:
    properties:
      name:
        maxLength: 100
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
    type: object
  internal_order.CreateOrderRequest:
    properties:
      customer_contact:
        maxLength: 20
        minLength: 7
        type: string
      customer_name:
        maxLength: 100
        type: string
      device_id:
        description: |-
          DeviceID identifies the client device for returning-customer recognition
          on the public order-intake page. Optional; the IP is captured server-side.
        maxLength: 64
        type: string
      group_id:
        description: |-
          GroupID attaches the order to an existing group (tab). When omitted, a
          new group is minted in the same transaction and attached automatically;
          its token is returned in the order's group_token so the UI can reuse it
          to attach later orders to the same tab.
        minimum: 1
        type: integer
      group_label:
        description: |-
          GroupLabel optionally names the tab when a new group is auto-created
          (ignored when group_id is supplied).
        maxLength: 100
        type: string
      ordered_at:
        description: OrderedAt sets the business order date; defaults to now when
          omitted.
        type: string
      products:
        items:
          $ref: '#/definitions/internal_order.OrderItemRequest'
        minItems: 1
        type: array
      status:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
      tax_percent:
        description: |-
          TaxPercent is the order tax rate as a percentage (0–100). Defaults to 0
          when omitted.
        maximum: 100
        minimum: 0
        type: number
    required:
    - customer_contact
    - customer_name
    - products
    type: object
  internal_order.CreatePublicOrderRequest:
    properties:
      customer_contact:
        maxLength: 20
        minLength: 7
        type: string
      customer_name:
        maxLength: 100
        type: string
      device_id:
        description: |-
          DeviceID identifies the client device for returning-customer recognition
          on the public order-intake page. Optional; the IP is captured server-side.
        maxLength: 64
        type: string
      group_id:
        description: |-
          GroupID attaches the order to an existing group (tab). When omitted, a
          new group is minted in the same transaction and attached automatically;
          its token is returned in the order's group_token so the UI can reuse it
          to attach later orders to the same tab.
        minimum: 1
        type: integer
      group_label:
        description: |-
          GroupLabel optionally names the tab when a new group is auto-created
          (ignored when group_id is supplied).
        maxLength: 100
        type: string
      ordered_at:
        description: OrderedAt sets the business order date; defaults to now when
          omitted.
        type: string
      products:
        items:
          $ref: '#/definitions/internal_order.OrderItemRequest'
        minItems: 1
        type: array
      status:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
      tax_percent:
        description: |-
          TaxPercent is the order tax rate as a percentage (0–100). Defaults to 0
          when omitted.
        maximum: 100
        minimum: 0
        type: number
      website:
        maxLength: 0
        type: string
    required:
    - customer_contact
    - customer_name
    - products
    type: object
  internal_order.Order:
    properties:
      app_id:
        type: integer
      created_at:
        type: string
      customer_contact:
        type: string
      customer_name:
        type: string
      device_id:
        description: |-
          DeviceID is the client-supplied device identifier used for returning-
          customer recognition on the public order-intake page.
        type: string
      division_id:
        type: integer
      group_id:
        type: integer
      group_token:
        type: string
      id:
        type: integer
      ip_address:
        description: IPAddress is the client IP captured server-side at creation.
          Read-only.
        type: string
      ordered_at:
        type: string
      products:
        items:
          $ref: '#/definitions/internal_order.OrderItem'
        type: array
      products_count:
        type: integer
      status:
        type: integer
      tax_percent:
        description: |-
          TaxPercent is the tax rate applied to the order as a percentage
          (e.g. 18.5 = 18.5%). Range 0–100.
        type: number
      total:
        description: |-
          Total is the pre-tax order amount: sum over items of (base price + chosen
          option deltas) * quantity. Persisted as a denormalized column and
          maintained on every item change, so it is populated on both list and
          detail reads.
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_order.OrderItem:
    properties:
      attributes:
        items:
          $ref: '#/definitions/internal_order.OrderItemAttribute'
        type: array
      id:
        type: integer
      line_total:
        description: LineTotal is (Price + sum of attribute PriceDelta) * Quantity.
        type: number
      price:
        type: number
      product_id:
        type: integer
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  internal_order.OrderItemAttribute:
    properties:
      attribute_id:
        type: integer
      attribute_name:
        type: string
      option_id:
        type: integer
      option_value:
        type: string
      price_delta:
        type: number
    type: object
  internal_order.OrderItemAttributeRequest:
    properties:
      attribute_id:
        type: integer
      option_id:
        type: integer
    required:
    - attribute_id
    - option_id
    type: object
  internal_order.OrderItemRequest:
    properties:
      attributes:
        items:
          $ref: '#/definitions/internal_order.OrderItemAttributeRequest'
        type: array
      product_id:
        type: integer
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  internal_order.SetOrderGroupRequest:
    properties:
      group_id:
        minimum: 1
        type: integer
    required:
    - group_id
    type: object
  internal_order.SyncOrderItemRequest:
    properties:
      attributes:
        items:
          $ref: '#/definitions/internal_order.OrderItemAttributeRequest'
        type: array
      id:
        minimum: 1
        type: integer
      product_id:
        minimum: 1
        type: integer
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  internal_order.UpdateOrderRequest:
    properties:
      customer_contact:
        maxLength: 20
        minLength: 7
        type: string
      customer_name:
        maxLength: 100
        type: string
      ordered_at:
        type: string
      products:
        items:
          $ref: '#/definitions/internal_order.SyncOrderItemRequest'
        minItems: 1
        type: array
      tax_percent:
        description: |-
          TaxPercent is the order tax rate as a percentage (0–100). When omitted the
          existing value is preserved.
        maximum: 100
        minimum: 0
        type: number
    required:
    - customer_contact
    - customer_name
    - products
    type: object
  internal_order.UpdateOrderStatusRequest:
    properties:
      status:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
    required:
    - status
    type: object
  internal_ordergroup.CreateOrderGroupRequest:
    properties:
      label:
        maxLength: 100
        type: string
    type: object
  internal_ordergroup.CreatePublicOrderGroupRequest:
    properties:
      label:
        maxLength: 100
        type: string
      website:
        maxLength: 0
        type: string
    type: object
  internal_ordergroup.OrderGroup:
    properties:
      app_id:
        type: integer
      created_at:
        type: string
      division_id:
        type: integer
      id:
        type: integer
      label:
        type: string
      orders:
        description: Orders is the member order summary list. Populated on detail
          reads.
        items:
          $ref: '#/definitions/internal_ordergroup.OrderSummary'
        type: array
      orders_count:
        description: OrdersCount is the number of orders in the group.
        type: integer
      status:
        type: integer
      token:
        type: string
      total:
        description: Total is the sum of all member orders' totals. Populated on detail
          reads.
        type: number
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_ordergroup.OrderSummary:
    properties:
      customer_name:
        type: string
      id:
        type: integer
      ordered_at:
        type: string
      status:
        type: integer
      total:
        type: number
    type: object
  internal_ordergroup.UpdateOrderGroupRequest:
    properties:
      label:
        maxLength: 100
        type: string
    type: object
  internal_ordergroup.UpdateOrderGroupStatusRequest:
    properties:
      status:
        enum:
        - 1
        - 2
        - 3
        - 4
        type: integer
    required:
    - status
    type: object
  internal_product.AssignedAttribute:
    properties:
      attribute_id:
        type: integer
      is_mandatory:
        type: boolean
      name:
        type: string
      options:
        items:
          $ref: '#/definitions/internal_product.AttributeOption'
        type: array
    type: object
  internal_product.AttributeAssignmentRequest:
    properties:
      attribute_id:
        type: integer
      is_mandatory:
        type: boolean
      options:
        items:
          $ref: '#/definitions/internal_product.AttributeOptionRequest'
        type: array
    required:
    - attribute_id
    type: object
  internal_product.AttributeOption:
    properties:
      id:
        type: integer
      price_delta:
        type: number
      value:
        type: string
    type: object
  internal_product.AttributeOptionRequest:
    properties:
      option_id:
        type: integer
      price_delta:
        type: number
    required:
    - option_id
    type: object
  internal_product.CategoryRef:
    properties:
      display:
        type: string
      id:
        type: integer
      name:
        type: string
      ord:
        description: |-
          Ord is the category's tenant-defined display position, so public
          clients can order menu groups without a separate categories call.
        type: integer
    type: object
  internal_product.CreateProductRequest:
    properties:
      attributes:
        items:
          $ref: '#/definitions/internal_product.AttributeAssignmentRequest'
        type: array
      category_id:
        type: integer
      featured:
        type: boolean
      name:
        maxLength: 200
        type: string
      price:
        minimum: 0
        type: number
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    type: object
  internal_product.Product:
    properties:
      app_id:
        type: integer
      attributes:
        items:
          $ref: '#/definitions/internal_product.AssignedAttribute'
        type: array
      category:
        $ref: '#/definitions/internal_product.CategoryRef'
      category_id:
        type: integer
      created_at:
        type: string
      division_id:
        type: integer
      featured:
        type: boolean
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      status:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_product.UpdateProductRequest:
    properties:
      attributes:
        items:
          $ref: '#/definitions/internal_product.AttributeAssignmentRequest'
        type: array
      category_id:
        type: integer
      featured:
        type: boolean
      name:
        maxLength: 200
        type: string
      price:
        minimum: 0
        type: number
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    - status
    type: object
  internal_storefront.Assessment:
    properties:
      name:
        type: string
      rating:
        type: number
      reviews:
        items:
          $ref: '#/definitions/ant_ent_schema.Review'
        type: array
      url:
        description: |-
          URL links to the platform's dedicated page for this storefront
          (e.g. its Zomato/Swiggy/Google listing). Optional.
        type: string
    type: object
  internal_storefront.FoodTag:
    properties:
      label:
        type: string
      slug:
        type: string
    type: object
  internal_storefront.GalleryImage:
    properties:
      caption:
        type: string
      sort:
        type: integer
      url:
        type: string
    type: object
  internal_storefront.PublicStorefront:
    properties:
      app_id:
        type: integer
      assessments:
        items:
          $ref: '#/definitions/internal_storefront.Assessment'
        type: array
      created_at:
        type: string
      division_id:
        type: integer
      food_tags:
        items:
          $ref: '#/definitions/internal_storefront.FoodTag'
        type: array
      gallery:
        items:
          $ref: '#/definitions/internal_storefront.GalleryImage'
        type: array
      hero_image:
        type: string
      id:
        type: integer
      products:
        items:
          $ref: '#/definitions/ant_internal_product.Product'
        type: array
      status:
        type: integer
      updated_at:
        type: string
    type: object
  internal_storefront.Storefront:
    properties:
      app_id:
        type: integer
      assessments:
        items:
          $ref: '#/definitions/internal_storefront.Assessment'
        type: array
      created_at:
        type: string
      division_id:
        type: integer
      food_tags:
        items:
          $ref: '#/definitions/internal_storefront.FoodTag'
        type: array
      gallery:
        items:
          $ref: '#/definitions/internal_storefront.GalleryImage'
        type: array
      hero_image:
        type: string
      id:
        type: integer
      status:
        type: integer
      updated_at:
        type: string
    type: object
  internal_storefront.UpsertStorefrontRequest:
    properties:
      assessments:
        items:
          $ref: '#/definitions/internal_storefront.Assessment'
        type: array
      food_tags:
        items:
          $ref: '#/definitions/internal_storefront.FoodTag'
        type: array
      gallery:
        items:
          $ref: '#/definitions/internal_storefront.GalleryImage'
        type: array
      hero_image:
        type: string
      status:
        type: integer
    type: object
host: localhost:8082
info:
  contact: {}
  description: This is the ant microservice.
  title: Ant API
  version: "1.0"
paths:
  /attributes:
    get:
      description: Get a list of all attributes for the authenticated app
      parameters:
      - description: Max items to return (default 50, max 500)
        in: query
        name: limit
        type: integer
      - description: Items to skip (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter by status (0 or 1)
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_attribute.Attribute'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: List all attributes
      tags:
      - attributes
    post:
      consumes:
      - application/json
      description: Create a new attribute with optional options
      parameters:
      - description: Attribute object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_attribute.CreateAttributeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_attribute.Attribute'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Create a new attribute
      tags:
      - attributes
  /attributes/{id}:
    delete:
      description: Delete an attribute and its options. Blocked if assigned to any
        product.
      parameters:
      - description: Attribute ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Delete attribute by ID
      tags:
      - attributes
    get:
      description: Get a single attribute with its options
      parameters:
      - description: Attribute ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_attribute.Attribute'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Get attribute by ID
      tags:
      - attributes
    put:
      consumes:
      - application/json
      description: 'Atomically update an attribute and sync its options in one call:
        options with an id are updated, ones without are created, existing options
        missing from the payload are deleted.'
      parameters:
      - description: Attribute ID
        in: path
        name: id
        required: true
        type: integer
      - description: Attribute object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_attribute.UpdateAttributeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_attribute.Attribute'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Update attribute by ID
      tags:
      - attributes
  /categories:
    get:
      description: List categories for the authenticated app. Filter by parent_id
        and status.
      parameters:
      - description: Filter by parent ID
        in: query
        name: parent_id
        type: integer
      - description: Filter by status (0 or 1)

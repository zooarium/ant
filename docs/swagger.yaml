            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Create a new product
      tags:
      - products

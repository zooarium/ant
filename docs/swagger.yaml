  /public/order-groups:
    post:
      consumes:
      - application/json
      description: Creates a tab (order group) on behalf of a guest-token caller and
        returns its server-minted token, which can be shared so other family members
        place orders under the same tab. Protected by reCAPTCHA and a hidden honeypot
        field.
      parameters:
      - description: Order group object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_ordergroup.CreatePublicOrderGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_ordergroup.OrderGroup'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Create an order group (public)
      tags:
      - Public
  /public/order-groups/{token}:
    get:
      description: Returns the tab identified by the shareable token, including all
        member orders and the combined total. Used by the order-intake page so a family
        member who has the token can view the whole tab.
      parameters:
      - description: Order group token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_ordergroup.OrderGroup'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Get an order group by token (public)
      tags:
      - Public
  /public/order-groups/history:
    get:
      description: 'Returns past tabs (order groups, newest first) that contain at
        least one order placed by the given device, each hydrated with all of its
        orders and the combined total. Recognition is best-effort: device_id is a
        soft, client-supplied signal, not proof of identity.'
      parameters:
      - description: Client device identifier
        in: query
        name: device_id
        required: true
        type: string
      - description: Max items to return (default 50, max 500)
        in: query
        name: limit
        type: integer
      - description: Items to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_ordergroup.OrderGroup'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: List order history for a device (public)
      tags:
      - Public
  /public/orders:
    post:
      consumes:
      - application/json
      description: Creates a pending order on behalf of a guest-token caller, optionally
        attaching it to an existing group (group_id) or auto-minting a new one. The
        order is always created pending — confirmation and payment are done at reception.
        Protected by reCAPTCHA, a hidden honeypot field, and a per-device volume cap.
      parameters:
      - description: Order object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_order.CreatePublicOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_order.Order'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Create an order (public)
      tags:
      - Public
  /public/storefront:
    get:
      description: Read-only storefront config (branding, gallery, food tags, platform
        assessments) plus the active product catalog (the menu) for a guest-token
        caller on the order-intake listener. Products are unpaginated but capped by
        PUBLIC_STOREFRONT.MAX_PRODUCTS; each carries its category ref so the UI can
        group the menu client-side. Scoped to the guest token's app_id/division_id
        claims. Returns an empty active storefront if none has been saved yet.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_storefront.PublicStorefront'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Get the storefront (public)
      tags:
      - Public
  /storefront:
    get:
      description: Get the tenant's storefront config (branding, gallery, food tags,
        platform assessments). Returns an empty active storefront if none has been
        saved yet.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_storefront.Storefront'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Get the storefront
      tags:
      - storefront
    put:
      consumes:
      - application/json
      description: Replace the whole storefront in one save. Gallery, food-tag, and
        assessment add/edit/delete is done by sending the full desired arrays.
      parameters:
      - description: Storefront object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_storefront.UpsertStorefrontRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/ant_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_storefront.Storefront'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ant_internal_platform_render.Response'
      security:
      - Bearer: []
      summary: Create or replace the storefront
      tags:
      - storefront
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Endpoints under the /public prefix, reachable with keeper guest tokens
    via the order-intake listener.
  name: Public
